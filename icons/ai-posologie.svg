<svg xmlns="http://www.w3.org/2000/svg" width="520" height="200">
<defs>
  <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#120c05"/><stop offset="100%" stop-color="#1a1005"/>
  </linearGradient>
</defs>
<rect width="520" height="200" fill="url(#bg6)"/>
<rect width="520" height="34" fill="#180e05"/>
<text x="14" y="22" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fdba74">MedFlow Posologie</text>
<text x="162" y="22" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Pharmacocinétique IA · 120+ médicaments · Ajustement rénal/hépatique</text>
<!-- Drug + patient panels -->
<rect x="8" y="40" width="152" height="154" rx="6" fill="#160c04" stroke="#fdba7420" stroke-width="1"/>
<text x="16" y="56" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">MÉDICAMENT</text>
<rect x="16" y="60" width="136" height="22" rx="5" fill="#fdba7415" stroke="#fdba7430" stroke-width="1"/>
<text x="84" y="75" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fdba74" text-anchor="middle">Vancomycine</text>
<text x="16" y="99" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">PATIENT</text>
<text x="16" y="113" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Poids</text><text x="148" y="113" font-family="system-ui,sans-serif" font-size="9" fill="#f1f5f9" text-anchor="end">78 kg</text>
<line x1="16" y1="117" x2="148" y2="117" stroke="#1e293b" stroke-width="1"/>
<text x="16" y="131" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">ClCr</text><text x="148" y="131" font-family="system-ui,sans-serif" font-size="9" fill="#f59e0b" text-anchor="end">38 mL/min</text>
<line x1="16" y1="135" x2="148" y2="135" stroke="#1e293b" stroke-width="1"/>
<text x="16" y="149" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Âge</text><text x="148" y="149" font-family="system-ui,sans-serif" font-size="9" fill="#f1f5f9" text-anchor="end">71 ans</text>
<line x1="16" y1="153" x2="148" y2="153" stroke="#1e293b" stroke-width="1"/>
<text x="16" y="167" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Indication</text><text x="148" y="167" font-family="system-ui,sans-serif" font-size="8" fill="#f1f5f9" text-anchor="end">SARM ostéite</text>
<!-- PK/PD result panel -->
<rect x="168" y="40" width="344" height="154" rx="6" fill="#160c04" stroke="#fdba7420" stroke-width="1"/>
<text x="176" y="56" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">RÉSULTAT POSOLOGIQUE — PK/PD IA</text>
<!-- Main dose -->
<rect x="176" y="60" width="328" height="44" rx="6" fill="#fdba7418" stroke="#fdba7435" stroke-width="1"/>
<text x="340" y="76" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="#fdba74" text-anchor="middle">1 250 mg / 24h</text>
<text x="340" y="95" font-family="system-ui,sans-serif" font-size="9" fill="#d97706" text-anchor="middle">Perfusion IV 90 min · Ajusté IRC stade IIIb · AUC/CMI cible 400–600</text>
<!-- PK parameters -->
<text x="176" y="122" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">PARAMÈTRES PK</text>
<text x="176" y="137" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Vd</text><text x="240" y="137" font-family="system-ui,sans-serif" font-size="9" fill="#f1f5f9">0.7 L/kg</text>
<text x="176" y="151" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">t½</text><text x="240" y="151" font-family="system-ui,sans-serif" font-size="9" fill="#f59e0b">18.4 h</text>
<text x="176" y="165" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Ctrough</text><text x="240" y="165" font-family="system-ui,sans-serif" font-size="9" fill="#10b981">14.2 mg/L</text>
<text x="176" y="179" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">AUC24</text><text x="240" y="179" font-family="system-ui,sans-serif" font-size="9" fill="#10b981">498 mg·h/L</text>
<!-- Interaction warning -->
<rect x="290" y="118" width="198" height="70" rx="6" fill="#f8717110" stroke="#f8717128" stroke-width="1"/>
<text x="298" y="133" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#f87171">⚠ Interactions détectées</text>
<text x="298" y="147" font-family="system-ui,sans-serif" font-size="8" fill="#fca5a5">Pipéracilline-tazo → néphrotox.</text>
<text x="298" y="160" font-family="system-ui,sans-serif" font-size="7" fill="#94a3b8">Risque : modéré · Surveillance créat.</text>
<text x="298" y="174" font-family="system-ui,sans-serif" font-size="8" fill="#fca5a5">Furosémide → ototoxicité</text>
<text x="298" y="184" font-family="system-ui,sans-serif" font-size="7" fill="#94a3b8">Risque : faible · Audiométrie si &gt;7j</text>
</svg>