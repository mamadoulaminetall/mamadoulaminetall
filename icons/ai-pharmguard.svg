<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f0a00"/><stop offset="100%" stop-color="#3d2000"/></linearGradient>
    <linearGradient id="ppanel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1200" stop-opacity="0.9"/><stop offset="100%" stop-color="#2a1800" stop-opacity="0.9"/></linearGradient>
  </defs>
  <rect width="520" height="200" fill="url(#pbg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="520" height="28" fill="#1a1200" fill-opacity="0.95"/>
  <text x="12" y="18" font-family="monospace" font-size="9" fill="#fbbf24" font-weight="700">PharmGuard-AI</text>
  <text x="110" y="18" font-family="monospace" font-size="9" fill="#78716c">·  Analyse ordonnance · CYP450 · QT · Marges étroites</text>
  <rect x="426" y="7" width="82" height="14" rx="3" fill="#fbbf24" fill-opacity="0.15"/>
  <text x="432" y="17" font-family="monospace" font-size="8" fill="#fbbf24">3 interactions</text>

  <!-- Left panel: drug list -->
  <rect x="8" y="34" width="155" height="158" rx="6" fill="url(#ppanel)" stroke="#fbbf24" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="16" y="46" font-family="monospace" font-size="7.5" fill="#a8a29e" font-weight="700">ORDONNANCE — 4 médicaments</text>
  <!-- Drug rows -->
  <rect x="12" y="50" width="147" height="20" rx="3" fill="#292207"/>
  <text x="18" y="61" font-family="monospace" font-size="8" fill="#fbbf24">Warfarine</text>
  <text x="18" y="68.5" font-family="monospace" font-size="6.5" fill="#78716c">5 mg/j · AVK anticoagulant</text>
  <rect x="133" y="54" width="22" height="10" rx="2" fill="#dc2626" fill-opacity="0.25"/>
  <text x="136" y="62" font-family="monospace" font-size="7" fill="#f87171">⚠ R</text>

  <rect x="12" y="74" width="147" height="20" rx="3" fill="#292207"/>
  <text x="18" y="85" font-family="monospace" font-size="8" fill="#fbbf24">Fluconazole</text>
  <text x="18" y="92.5" font-family="monospace" font-size="6.5" fill="#78716c">200 mg/j · antifongique</text>
  <rect x="133" y="78" width="22" height="10" rx="2" fill="#dc2626" fill-opacity="0.25"/>
  <text x="136" y="86" font-family="monospace" font-size="7" fill="#f87171">⚠ R</text>

  <rect x="12" y="98" width="147" height="20" rx="3" fill="#1f1a00"/>
  <text x="18" y="109" font-family="monospace" font-size="8" fill="#e7c77a">Amiodarone</text>
  <text x="18" y="116.5" font-family="monospace" font-size="6.5" fill="#78716c">200 mg/j · antiarythmique</text>
  <rect x="133" y="102" width="22" height="10" rx="2" fill="#d97706" fill-opacity="0.2"/>
  <text x="136" y="110" font-family="monospace" font-size="7" fill="#fbbf24">⚠ M</text>

  <rect x="12" y="122" width="147" height="20" rx="3" fill="#1a1200"/>
  <text x="18" y="133" font-family="monospace" font-size="8" fill="#9ca3af">Metformine</text>
  <text x="18" y="140.5" font-family="monospace" font-size="6.5" fill="#78716c">850 mg ×2 · antidiabétique</text>
  <rect x="133" y="126" width="22" height="10" rx="2" fill="#16a34a" fill-opacity="0.2"/>
  <text x="138" y="134" font-family="monospace" font-size="7" fill="#4ade80">✓ OK</text>

  <!-- CYP450 pathway -->
  <rect x="12" y="148" width="147" height="38" rx="4" fill="#12100000" fill-opacity="0.5"/>
  <text x="16" y="158" font-family="monospace" font-size="7" fill="#78716c" font-weight="700">CYP2C9</text>
  <rect x="55" y="152" width="95" height="6" rx="3" fill="#1c1700"/>
  <rect x="55" y="152" width="82" height="6" rx="3" fill="#dc2626" fill-opacity="0.5"/>
  <text x="153" y="158" font-family="monospace" font-size="7" fill="#f87171">87%</text>
  <text x="16" y="171" font-family="monospace" font-size="7" fill="#78716c" font-weight="700">QTc</text>
  <rect x="55" y="165" width="95" height="6" rx="3" fill="#1c1700"/>
  <rect x="55" y="165" width="42" height="6" rx="3" fill="#d97706" fill-opacity="0.5"/>
  <text x="153" y="171" font-family="monospace" font-size="7" fill="#fbbf24">44%</text>
  <text x="16" y="184" font-family="monospace" font-size="7" fill="#78716c">Risque global</text>
  <rect x="75" y="178" width="75" height="6" rx="3" fill="#1c1700"/>
  <rect x="75" y="178" width="60" height="6" rx="3" fill="#dc2626" fill-opacity="0.6"/>
  <text x="153" y="184" font-family="monospace" font-size="7" fill="#f87171">ÉLEVÉ</text>

  <!-- Right panel: alerts -->
  <rect x="171" y="34" width="341" height="158" rx="6" fill="#120a00" fill-opacity="0.7" stroke="#f87171" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="180" y="47" font-family="monospace" font-size="7.5" fill="#f87171" font-weight="700">INTERACTIONS DÉTECTÉES · 3 alertes</text>

  <!-- Alert 1 - MAJEURE -->
  <rect x="178" y="52" width="326" height="46" rx="4" fill="#2a0a0a" stroke="#dc2626" stroke-width="0.8"/>
  <rect x="178" y="52" width="50" height="12" rx="2" fill="#dc2626"/>
  <text x="183" y="61" font-family="monospace" font-size="7.5" fill="#fff" font-weight="700">MAJEURE</text>
  <text x="235" y="61" font-family="monospace" font-size="8" fill="#fca5a5" font-weight="700">Warfarine + Fluconazole</text>
  <text x="182" y="73" font-family="monospace" font-size="7.5" fill="#f87171">↑ INR ×4.2 · risque hémorragique grave</text>
  <text x="182" y="83" font-family="monospace" font-size="7" fill="#9ca3af">Fluconazole inhibe CYP2C9 → ↑ warfarine plasmatique</text>
  <text x="182" y="93" font-family="monospace" font-size="7" fill="#78716c">Recommandation : réduire warfarine 30–50% + contrôle INR 48h</text>

  <!-- Alert 2 - MODÉRÉE -->
  <rect x="178" y="103" width="326" height="42" rx="4" fill="#1f1200" stroke="#d97706" stroke-width="0.8"/>
  <rect x="178" y="103" width="52" height="12" rx="2" fill="#d97706"/>
  <text x="183" y="112" font-family="monospace" font-size="7.5" fill="#fff" font-weight="700">MODÉRÉE</text>
  <text x="237" y="112" font-family="monospace" font-size="8" fill="#fde68a" font-weight="700">Amiodarone + Warfarine</text>
  <text x="182" y="124" font-family="monospace" font-size="7.5" fill="#fbbf24">Inhibition CYP2C9 + CYP3A4 · potentialisation anticoag.</text>
  <text x="182" y="134" font-family="monospace" font-size="7" fill="#78716c">Réduire warfarine 30–50% · surveiller INR semaine 1–4</text>
  <text x="182" y="141" font-family="monospace" font-size="7" fill="#9ca3af">Délai d'action amiodarone : 4–6 semaines</text>

  <!-- Alert 3 - QT -->
  <rect x="178" y="150" width="326" height="36" rx="4" fill="#0f1206" stroke="#facc15" stroke-width="0.5"/>
  <rect x="178" y="150" width="42" height="12" rx="2" fill="#ca8a04"/>
  <text x="183" y="159" font-family="monospace" font-size="7.5" fill="#fff" font-weight="700">QT LONG</text>
  <text x="227" y="159" font-family="monospace" font-size="8" fill="#fef08a" font-weight="700">Amiodarone</text>
  <text x="182" y="170" font-family="monospace" font-size="7.5" fill="#fde047">QTc estimé 498 ms · risque torsades de pointes</text>
  <text x="182" y="180" font-family="monospace" font-size="7" fill="#78716c">ECG recommandé avant initiation · éviter associations QT+</text>
</svg>
