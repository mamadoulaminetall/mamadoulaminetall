  <polyline points="342,88 348,80 354,66 360,58 366,62 372,75 378,85 384,89" fill="none" stroke="#5eead4" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="360" y1="42" x2="360" y2="90" stroke="#f87171" stroke-width="0.8" stroke-dasharray="2,2"/>
