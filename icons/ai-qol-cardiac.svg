  <text x="305" y="35" font-family="monospace" font-size="7" fill="#64748b">P68</text>

  <text x="10" y="50" font-family="monospace" font-size="7" fill="#94a3b8" font-weight="700">SF-36</text>
  <rect x="52" y="43" width="200" height="9" rx="3" fill="#0f2a2a"/>
  <rect x="52" y="43" width="116" height="9" rx="3" fill="#34d399" fill-opacity="0.7"/>
  <text x="256" y="51" font-family="monospace" font-size="7.5" fill="#34d399" font-weight="700">58/100</text>
  <text x="305" y="51" font-family="monospace" font-size="7" fill="#64748b">P51</text>

  <text x="10" y="66" font-family="monospace" font-size="7" fill="#94a3b8" font-weight="700">MLHFQ</text>
  <rect x="52" y="59" width="200" height="9" rx="3" fill="#0f2a2a"/>
  <rect x="52" y="59" width="170" height="9" rx="3" fill="#2dd4bf" fill-opacity="0.65"/>
  <text x="256" y="67" font-family="monospace" font-size="7.5" fill="#2dd4bf" font-weight="700">85/105</text>
  <text x="305" y="67" font-family="monospace" font-size="7" fill="#64748b">P77</text>

  <text x="10" y="82" font-family="monospace" font-size="7" fill="#94a3b8" font-weight="700">EQ-5D</text>
  <rect x="52" y="75" width="200" height="9" rx="3" fill="#0f2a2a"/>
  <rect x="52" y="75" width="130" height="9" rx="3" fill="#5eead4" fill-opacity="0.55"/>
  <text x="256" y="83" font-family="monospace" font-size="7.5" fill="#5eead4" font-weight="700">0.65</text>
  <text x="305" y="83" font-family="monospace" font-size="7" fill="#64748b">P59</text>

  <!-- Right: population curve sketch -->
  <rect x="338" y="26" width="54" height="68" rx="4" fill="#0a1a1a" fill-opacity="0.6" stroke="#5eead4" stroke-width="0.4" stroke-opacity="0.3"/>
