<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" width="400" height="130">
  <defs>
    <linearGradient id="qbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#060d12"/><stop offset="100%" stop-color="#091a1a"/></linearGradient>
  </defs>
  <rect width="400" height="130" fill="url(#qbg)" rx="8"/>
  <rect x="0" y="0" width="400" height="22" fill="#0a1a1a" fill-opacity="0.95" rx="8"/>
  <rect x="0" y="14" width="400" height="8" fill="#0a1a1a" fill-opacity="0.95"/>
  <text x="10" y="15" font-family="monospace" font-size="8.5" fill="#5eead4" font-weight="700">QoL Cardiac — 4 questionnaires · 600 patients</text>
